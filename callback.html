<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Webex Auth — Completando...</title>
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0b141a; color: #e9edef;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; margin: 0; flex-direction: column; gap: 16px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #374045; border-top-color: #25D366;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 14px; color: #8696a0; }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <p id="msg">Completando autenticación con Webex...</p>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var code   = params.get("code");
      var state  = params.get("state");
      var error  = params.get("error");

      if (error) {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("msg").textContent = "Error: " + error;
        setTimeout(function() { window.close(); }, 3000);
        return;
      }

      if (code) {
        // Send code back to the adapter iframe (index.html) via postMessage
        // opener = the adapter window that called window.open()
        if (window.opener) {
          window.opener.postMessage(
            { wa_code: code, wa_state: state || "" },
            "https://jguerra5.github.io"
          );
        }
        document.getElementById("spinner").style.display = "none";
        document.getElementById("msg").textContent = "✅ Autenticación exitosa. Cerrando...";
        setTimeout(function() { window.close(); }, 1500);
      } else {
        document.getElementById("msg").textContent = "No se recibió código de autorización.";
        setTimeout(function() { window.close(); }, 3000);
      }
    })();
  </script>
</body>
</html>
